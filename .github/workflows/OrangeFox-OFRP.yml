name: OrangeFox [OFRP]

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build OrangeFox
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PRODUCT_RELEASE_NAME: a23
      DEVICE_NAME: a23
      DEVICE_VENDOR: samsung
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Set up job
      run: echo "Starting OrangeFox build job"

    - name: Checkout
      uses: actions/checkout@v4

    - name: Send Start Notification
      run: |
        echo "Build started for Samsung Galaxy A23 4G"

    - name: Display Inputs
      run: |
        echo "Branch: 12.1"
        echo "Device: a23"
        echo "Target: recovery"

    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install \
          gperf gcc-multilib g++-multilib libc6-dev \
          lib32ncurses5-dev lib32z1-dev liblz4-tool \
          libncurses5-dev libsdl1.2-dev libxml2-utils \
          lzop pngcrush schedtool squashfs-tools \
          imagemagick libbz2-dev lzma ncftp \
          qemu-user-static libstdc++-10-dev \
          python3 repo bc ccache

    - name: Set-up Manifest
      run: |
        mkdir -p $GITHUB_WORKSPACE/OrangeFox
        cd $GITHUB_WORKSPACE/OrangeFox
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch 12.1 --path \
          $GITHUB_WORKSPACE/OrangeFox/fox_12.1

    - name: Clone Device Tree
      run: |
        cd $GITHUB_WORKSPACE/OrangeFox/fox_12.1
        mkdir -p device/samsung
        git clone https://gitlab.com/YOUR_USERNAME/android_device_samsung_a23 \
          -b android-14_ofrp device/samsung/a23
        cd device/samsung/a23
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Extracting variables from .mk file
      run: |
        echo "Skipped – variables are fixed for a23"

    - name: Installing python2 for legacy builds
      if: false
      run: echo "Not required for 12.1"

    - name: Building OrangeFox
      run: |
        cd $GITHUB_WORKSPACE/OrangeFox/fox_12.1
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_a23-eng
        mka clean
        mka adbd recoveryimage

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Check if Recovery Exist
      run: |
        ls out/target/product/a23/OrangeFox*.img

    - name: Upload to Release
      if: success()
      uses: softprops/action-gh-release@master
      with:
        files: |
          OrangeFox/fox_12.1/out/target/product/a23/OrangeFox*.img
        tag_name: ${{ github.run_id }}

    - name: Send Success Notification
      if: success()
      run: echo "Build completed successfully"

    - name: Send Failure Notification
      if: failure()
      run: echo "Build failed"

    - name: Run LDCheck
      if: false
      run: echo "LDCheck disabled"

    - name: Post Checkout
      run: echo "Post build cleanup"

    - name: Complete job
      run: echo "Job completed"
