name: OrangeFox [OFRP]

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '12.1'
        type: choice
        options:
          - 12.1
          - 11.0
          - 10.0
          - 9.0
          - 8.1
          - 7.1
          - 6.0

      DEVICE_TREE:
        description: 'Device Tree Repository'
        required: true
        default: 'https://gitlab.com/YOUR_USERNAME/android_device_samsung_a23'

      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'android-14_ofrp'

      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
          - boot
          - recovery
          - vendorboot

      LDCHECK:
        description: 'Run LDCheck'
        required: false
        default: false
        type: boolean

      LDCHECKPATH:
        description: 'Path of blobs to check'
        required: true
        default: 'system/bin/qseecomd'

jobs:
  build:
    name: Build OrangeFox (a23)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PRODUCT_RELEASE_NAME: a23
      DEVICE_NAME: a23
      DEVICE_VENDOR: samsung
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean workspace
        uses: rokibhasansagar/slimhub_actions@main

      - name: Setup swap
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt -y upgrade
          sudo apt -y install \
            gperf gcc-multilib g++-multilib libc6-dev \
            lib32ncurses5-dev lib32z1-dev liblz4-tool \
            libncurses5-dev libsdl1.2-dev libxml2-utils \
            lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma ncftp \
            qemu-user-static libstdc++-10-dev \
            python3 repo bc ccache

      - name: Sync OrangeFox source
        run: |
          mkdir -p $GITHUB_WORKSPACE/OrangeFox
          cd $GITHUB_WORKSPACE/OrangeFox
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          ./orangefox_sync.sh \
            --branch ${{ inputs.MANIFEST_BRANCH }} \
            --path $GITHUB_WORKSPACE/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

      - name: Clone device tree (correct layout)
        run: |
          cd $GITHUB_WORKSPACE/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          mkdir -p device/samsung
          git clone ${{ inputs.DEVICE_TREE }} \
            -b ${{ inputs.DEVICE_TREE_BRANCH }} \
            device/samsung/a23
          cd device/samsung/a23
          echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Verify device tree
        run: |
          ls $GITHUB_WORKSPACE/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/device/samsung/a23/AndroidProducts.mk

      - name: Build OrangeFox
        run: |
          cd $GITHUB_WORKSPACE/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true

          if [ "${{ inputs.MANIFEST_BRANCH }}" = "11.0" ] || \
             [ "${{ inputs.MANIFEST_BRANCH }}" = "12.1" ]; then
            lunch twrp_a23-eng
            mka clean
            mka adbd ${{ inputs.BUILD_TARGET }}image
          else
            lunch omni_a23-eng
            mka clean
            mka ${{ inputs.BUILD_TARGET }}image
          fi

      - name: Run LDCheck
        if: inputs.LDCHECK == true
        continue-on-error: true
        run: |
          cd $GITHUB_WORKSPACE/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          OUT=out/target/product/a23/recovery/root
          cp -n tools/ldcheck $OUT/
          cp -n tools/libneeds $OUT/
          cd $OUT
          python3 ldcheck \
            -p system/lib64:vendor/lib64:system/lib:vendor/lib \
            -d ${{ inputs.LDCHECKPATH }}

      - name: Upload build
        uses: softprops/action-gh-release@master
        with:
          files: |
            OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/a23/OrangeFox*.img
            OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/a23/OrangeFox*.zip
          name: OrangeFox a23
          tag_name: ${{ github.run_id }}
          body: |
            Device: Samsung Galaxy A23 4G
            Branch: ${{ inputs.MANIFEST_BRANCH }}
            Tree: ${{ inputs.DEVICE_TREE }}
            Commit: ${{ env.COMMIT_ID }}
